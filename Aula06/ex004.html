<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinando Js</title>
    <style>
        body {
            font-style: normal;
            font-size: 1.5em;
            font-family: Arial;
        }
    </style>
</head>
<body>
    
    <script>
        var nome = window.prompt("Qual é o seu nome?")
        document.write(`Ola <strong>${nome}</strong>! seu nome tem ${nome.length} letras <br/>`) 
        document.write(`Seu nome com letras maiúsculas é ${nome.toLocaleUpperCase()} <br/>`)
        document.write(`Seu nome em minúsculas é ${nome.toLowerCase()}`)

        


    </script>

</body>
</html>
